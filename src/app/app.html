<div class="flex min-h-screen flex-col bg-slate-100 text-slate-950">

    >
      <div class="mx-auto w-fit md:mx-0">
        <img

          class="h-auto w-72 sm:w-80"

      <nav aria-label="Hauptnavigation" class="w-full md:w-auto">

            </a>
          </li>
          <li>

  <footer class="border-t border-slate-300 bg-white">
